server:
    port: 49021

spring:
    devtools:
        restart:
            enabled: true
        livereload:
            enabled: true
    kafka:
        bootstrap-servers: localhost:49092
    datasource:
        url: jdbc:mysql://localhost:49020/db_ec_orden_ms
        username: root
        password: root
        driver-class-name: com.mysql.cj.jdbc.Driver
    flyway:
        enabled: false

    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true
        properties:
            hibernate:
                format_sql: true
