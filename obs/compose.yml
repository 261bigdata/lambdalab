name: lambdalab-obs

services:
  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: lambdalab-prometheus
    restart: unless-stopped
    ports:
      - "49090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - lambdalab_prometheus_data:/prometheus
    networks:
      - lambdalab-kafka-net

  grafana:
    image: grafana/grafana:11.6.0
    container_name: lambdalab-grafana
    restart: unless-stopped
    ports:
      - "43000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - lambdalab_grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - lambdalab-kafka-net

  # loki:
  #   image: grafana/loki:3.4.1
  #   container_name: lambdalab-loki
  #   restart: unless-stopped
  #   ports:
  #     - "43100:3100"
  #   command: -config.file=/etc/loki/local-config.yaml
  #   volumes:
  #     - ./loki/config.yml:/etc/loki/local-config.yaml:ro
  #     - lambdalab_loki_data:/loki
  #   networks:
  #     - lambdalab-kafka-net

  # promtail:
  #   image: grafana/promtail:3.4.1
  #   container_name: lambdalab-promtail
  #   restart: unless-stopped
  #   command: -config.file=/etc/promtail/config.yml
  #   volumes:
  #     - ./promtail/config.yml:/etc/promtail/config.yml:ro
  #     - ../logs:/var/log/lambdalab:ro
  #   depends_on:
  #     - loki
  #   networks:
  #     - lambdalab-kafka-net

volumes:
  lambdalab_prometheus_data:
  lambdalab_grafana_data:
  # lambdalab_loki_data:

networks:
  lambdalab-kafka-net:
    external: true
    name: lambdalab-kafka-net
